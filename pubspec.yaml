name: bookvista
description: A book reading and publishing app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase & Backend
  supabase_flutter: ^2.5.0

  #firebase
  firebase_core: ^3.0.0
  firebase_analytics: ^11.0.0
  
  # Navigation
  go_router: ^14.0.0
  
  # State Management
  riverpod: ^2.5.0
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  
  # Storage & Caching
  shared_preferences: ^2.2.0
  cached_network_image: ^3.3.0
  flutter_secure_storage: ^9.0.0
  
  # Media & UI
  image_picker: ^1.0.5
  lottie: ^3.1.0
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0
  google_mobile_ads: ^5.1.0
  
  # Page Curl Effect (Null-safe - choose one)
  page_curl_effect: ^1.0.2   # ✅ Recommended, actively maintained
  
  # Utilities
  equatable: ^2.0.5
  intl: ^0.19.0
  json_annotation: ^4.9.0
  flutter_dotenv: ^6.0.1
  http: ^1.2.0
  permission_handler: ^11.3.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0
  workmanager: ^0.9.0
  logger: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  freezed: ^2.5.0
  freezed_annotation: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/animations/
    - assets/images/